name: TikTok FYP トレンド収集

on:
  # 定期実行: 毎日 JST 8:00 / 12:00 / 20:00 (UTC 23:00 / 3:00 / 11:00)
  schedule:
    - cron: '0 23 * * *'   # JST 08:00
    - cron: '0 3  * * *'   # JST 12:00
    - cron: '0 11 * * *'   # JST 20:00
  # 手動実行 (GitHub UI の "Run workflow" ボタン)
  workflow_dispatch:
    inputs:
      scrolls:
        description: 'スクロール回数'
        default: '15'
      min_plays:
        description: '最低再生数 (例: 1000000 = 100万)'
        default: '1000000'
      slack_top:
        description: 'Slack 通知件数'
        default: '10'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.13 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright Chromium をインストール
        run: playwright install chromium --with-deps

      # Playwright headless モードで動作させる (Xvfb 不要)
      - name: TikTok FYP トレンドを収集して Slack 通知
        run: |
          python scripts/browse_fyp.py \
            --scrolls ${{ github.event.inputs.scrolls || '15' }} \
            --min-plays ${{ github.event.inputs.min_plays || '1000000' }} \
            --slack-top ${{ github.event.inputs.slack_top || '10' }} \
            --analyze ${{ github.event.inputs.slack_top || '10' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # headless モード強制 (CI では DISPLAY がないため)
          DISPLAY: ""
